name: Validation of Dublin Core compliance for MEI Files

on:
  push:
    branches: 
      - ftr/metadata-validation-and-generation
      - main
  pull_request:
    branches: 
      - ftr/metadata-validation-and-generation
      - main
  workflow_dispatch:

jobs:
  validate-schematron:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout current Repository
        uses: actions/checkout@v6
        with:
          ref: ftr/metadata-validation-and-generation

      - name: Checkout Tools Repository
        uses: actions/checkout@v6
        with:
          repository: Edirom/mei-metadata-toolkit
          ref: main
          path: mei-metadata-toolkit

      - name: Create necessary directories
        run: |
          mkdir -p .github/workflow-reports

      - name: Install Java and Saxon-HE
        run: |
          echo "Installing Java..."
          sudo apt-get update
          sudo apt-get install -y default-jre-headless
          
          echo "Downloading Saxon-HE..."
          # Using the 12.9 version as requested
          wget -q https://github.com/Saxonica/Saxon-HE/releases/download/SaxonHE12-9/SaxonHE12-9J.zip
          unzip -q SaxonHE12-9J.zip
 
          # Verify the jar exists
          if [ ! -f "saxon-he-12.9.jar" ]; then
            echo "Error: Saxon JAR not found after unzip."
            exit 1
          fi
          
          echo "SAXON_JAR=$(pwd)/saxon-he-12.9.jar" >> $GITHUB_ENV
          echo "Java Version:"
          java -version

      - name: Find all XML files
        id: find-xml
        run: |
          find . -type f -name "*.xml" \
            ! -path "./.github/*" \
            ! -path "./vendor/*" \
            ! -path "./.git/*" \
            ! -name "*.xml.bak" \
            > xml_files.txt
          
          count=$(wc -l < xml_files.txt)
          echo "Found $count XML files."
          echo "count=$count" >> $GITHUB_OUTPUT

      - name: Run Schematron Validation
        id: validation
        env:
          SCHEMATRON_FILE: "mei-metadata-toolkit/src/schema/mei-dc.sch"
          REPORT_FILE: ".github/workflow-reports/mei-dublin-core-validation.md"
        run: |
          REPORT="$REPORT_FILE"
          
          # Initialize the report
          echo "### Schematron Validation Report" > "$REPORT"
          echo "Branch: ${{ github.ref_name }}" >> "$REPORT"
          echo "Schema: $SCHEMATRON_FILE" >> "$REPORT"
          echo "Generated: $(date)" >> "$REPORT"
          echo "" >> "$REPORT"
          
          ALL_SUCCESS=true
          TOTAL_FILES=0
          PASSED_FILES=0
          FAILED_FILES=0

          # Read the file list
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            
            TOTAL_FILES=$((TOTAL_FILES + 1))
            echo "Processing file $TOTAL_FILES/$TOTAL_FILES: $file"
            
            # Check if the file actually exists on disk (safety check)
            if [ ! -f "$file" ]; then
              echo "  ⚠️  Warning: File $file not found on disk. Skipping." >> "$REPORT"
              continue
            fi

            echo "Validating: $file" >> "$REPORT"
            
            # Run Saxon-HE
            # -s: Source XML file
            # -schematron: The Schematron schema file
            # 2>&1: Capture both stdout and stderr


            # Verify the schematron file exists
            if [ ! -f "$SCHEMATRON_FILE" ]; then
              echo "Error: Schematron file not found."
              exit 1
            fi

            # Verify the jar exists
            if [ ! -f "$SAXON_JAR" ]; then
              echo "Error: Saxon JAR not found after unzip."
              exit 1
            fi
          

            output=$(java -jar "$SAXON_JAR" -s="$file" -schematron="$SCHEMATRON_FILE" 2>&1)
            exit_code=$?
            set -e
            
            if [ $exit_code -eq 0 ]; then
              echo "  ✅ Status: PASSED" >> "$REPORT"
              echo "" >> "$REPORT"
              PASSED_FILES=$((PASSED_FILES + 1))
            else
              ALL_SUCCESS=false
              echo "  ❌ Status: FAILED" >> "$REPORT"
              echo "  --- Error Messages ---" >> "$REPORT"
              # Print the error output
              echo "$output" >> "$REPORT"
              echo "" >> "$REPORT"
              FAILED_FILES=$((FAILED_FILES + 1))
            fi
          done < xml_files.txt

          # Final Summary
          echo "### Summary" >> "$REPORT"
          echo "Total Files: $TOTAL_FILES" >> "$REPORT"
          echo "Passed: $PASSED_FILES" >> "$REPORT"
          echo "Failed: $FAILED_FILES" >> "$REPORT"
          
          if [ "$ALL_SUCCESS" = true ]; then
            echo "✅ All XML files validated successfully." >> "$REPORT"
          else
            echo "❌ One or more XML files failed validation." >> "$REPORT"
          fi

          # Print the report to the Action logs
          echo "## Validation Report"
          cat "$REPORT"

      - name: Fail if Validation Failed
        run: |
          if grep -q "❌ One or more XML files failed validation" "$REPORT_FILE"; then
            echo "Validation failed. Check the report above."
            exit 1
          fi
          echo "Validation passed."
          exit 0

      - name: Upload Validation Report as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mei-dc-validation-report
          path: .github/workflow-reports/mei-dc-validation_report.md
